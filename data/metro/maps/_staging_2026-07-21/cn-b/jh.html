<script>
	$(function () {
		const sourceFileDom = $('#mainText');
		let findIndex = -1;

		// 使用箭头函数保持this上下文
		sourceFileDom.find('a').each(function() {
		const aTag = $(this);
		const href = aTag.attr('href');
		
		if (href && href.endsWith('.pdf')) {
			findIndex++;
			const text = aTag.text();
			const parentDom = $(this).parent();
			const isFirst = findIndex === 0;
			
			// 使用已定义的变量
			const pdfItem = $('<div class="pdf-item">' +
			'<div class="pdf-item__header">' +
				'<a href="' + href + '" class="pdf-name" download="' + text + '">' + text + '</a>' +
				'<div class="pdf-operations">' +
				'<button class="watch">查看文件</button>' +
				'</div>' +
			'</div>' +
			'<div class="pdf-item__content" style="display: ' + (isFirst ? 'block' : 'none') + ';">' +
				'<iframe id="pdfviewerframe" src="' + href + '" scrolling="no" frameborder="0" style="padding-bottom: 5px;background: #3e3e3e;margin-top: 10px;width: 100%;height: 1000px"></iframe>' +
			'</div>' +
			'</div>');
			
			parentDom.append(pdfItem);
			aTag.remove();
			
			pdfItem.find('.watch').on('click', function() {
			pdfItem.find('.pdf-item__content').toggle();
			sourceFileDom.find('.pdf-item__content').not(pdfItem.find('.pdf-item__content')).hide();
			});
		}
		});
	})
</script>
