<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>論文本文 · Adapt-Metro</title>
<meta name="description" content="博士論文文稿（自適應版面的地理空間網絡資料視覺化）：Google Docs 式無頁面（pageless）一頁式檢視，Markdown 原文與渲染顯示可切換，內容與 slides/thesis/paper.md 同步。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
<style>
  :root{
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'PingFang TC', 'Noto Sans TC', Arial, sans-serif;
    /* Google Docs chrome 配色 */
    --gd-chrome:#f9fbfd; --gd-tb:#edf2fa; --gd-ink:#1f1f1f; --gd-icon:#444746;
    --gd-hover:rgba(68,71,70,.08); --gd-border:#c7c7c7; --gd-canvas:#f8fafd;
    --gd-blue:#1a73e8; --gd-tonal:#c2e7ff; --gd-tonal-ink:#001d35;
  }
  /* 首頁 app 的 shadcn design token（同 slides/index.html），只給 header 用。 */
  :root{
    --app-card:0 0% 100%; --app-border:214.3 31.8% 91.4%;
    --app-fg:222.2 84% 4.9%; --app-muted-fg:215.4 16.3% 40%;
    --app-primary:221.2 83.2% 53.3%;
    --app-accent:210 40% 96.1%; --app-accent-fg:222.2 47.4% 11.2%;
    --app-popover:0 0% 100%; --app-popover-fg:222.2 84% 4.9%;
    --app-radius:0.5rem;
  }
  html.dark{
    --app-card:222.2 84% 4.9%; --app-border:217.2 32.6% 17.5%;
    --app-fg:210 40% 98%; --app-muted-fg:215 20.2% 65.1%;
    --app-primary:217.2 91.2% 59.8%;
    --app-accent:217.2 32.6% 17.5%; --app-accent-fg:210 40% 98%;
    --app-popover:222.2 84% 4.9%; --app-popover-fg:210 40% 98%;
  }
  html[data-theme='violet']{ --app-primary:262.1 83.3% 57.8%; }
  html[data-theme='emerald']{ --app-primary:142.1 76.2% 36.3%; }
  html[data-theme='rose']{ --app-primary:346.8 77.2% 49.8%; }
  html[data-theme='amber']{ --app-primary:24.6 95% 53.1%; }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:var(--sans); background:var(--gd-canvas); color:#0f172a;
    display:flex; flex-direction:column; -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; }

  /* ---- header：逐字複製首頁 TopToolbar ---- */
  .app-toolbar{
    display:flex; align-items:center; gap:4px; min-height:44px; padding:4px 8px; flex-shrink:0;
    border-bottom:1px solid hsl(var(--app-border)); background:hsl(var(--app-card));
    position:sticky; top:0; z-index:60;
  }
  .app-toolbar .brand{
    display:flex; align-items:center; gap:6px; padding:0 10px 0 4px;
    font-size:13px; font-weight:600; color:hsl(var(--app-primary));
    white-space:nowrap; flex-shrink:0; text-decoration:none;
  }
  .app-toolbar .btn-ghost{
    display:inline-flex; align-items:center; gap:4px; height:32px; padding:0 10px;
    border-radius:calc(var(--app-radius) - 2px); font-size:13px; white-space:nowrap;
    color:hsl(var(--app-fg)); text-decoration:none; background:none; border:0; cursor:pointer;
    font-family:inherit; transition:background .12s, color .12s;
  }
  .app-toolbar .btn-ghost:hover{ background:hsl(var(--app-accent)); color:hsl(var(--app-accent-fg)); }
  .app-toolbar .btn-ghost.active{ color:hsl(var(--app-primary)); }
  .app-toolbar .skills-link{ margin-left:auto; }
  .app-toolbar .m-icon{
    font-family:'Material Symbols Outlined'; font-weight:normal; font-style:normal;
    line-height:1; display:inline-block; vertical-align:middle; flex-shrink:0;
    font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20; -webkit-font-feature-settings:'liga';
  }

  /* =====================================================================
     Google Docs 式門面：標題列（文件圖示＋文件名＋選單列）→ 工具列藥丸 → 尺規
     ===================================================================== */
  .gd-chrome{ flex-shrink:0; background:var(--gd-chrome); padding:6px 16px 8px; }
  .gd-titlebar{ display:flex; align-items:flex-start; gap:10px; }
  .gd-docicon{ flex-shrink:0; width:26px; height:34px; margin-top:4px; }
  .gd-titlecol{ min-width:0; flex:1; }
  .gd-titlerow{ display:flex; align-items:center; gap:6px; padding:2px 0 0; }
  .gd-title{
    font-size:18px; color:var(--gd-ink); font-weight:400; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; padding:1px 6px; border-radius:4px;
  }
  .gd-title:hover{ outline:1px solid #dadce0; }
  .gd-menus{ display:flex; align-items:center; gap:0; flex-wrap:nowrap; overflow:hidden; }
  .gd-menu{
    position:relative; font-size:13.5px; color:var(--gd-ink); padding:3px 8px; border-radius:5px;
    cursor:default; user-select:none; white-space:nowrap;
  }
  .gd-menu:hover{ background:var(--gd-hover); }
  .gd-menu.open{ background:var(--gd-hover); }
  .gd-drop{
    position:absolute; top:26px; left:0; z-index:300; min-width:230px;
    background:#fff; border-radius:8px; padding:6px 0;
    box-shadow:0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
  }
  .gd-drop[hidden]{ display:none; }
  .gd-drop button, .gd-drop a{
    display:flex; align-items:center; gap:12px; width:100%; padding:7px 18px 7px 14px;
    background:none; border:0; font-family:inherit; font-size:13.5px; color:var(--gd-ink);
    cursor:pointer; text-align:left; text-decoration:none; white-space:nowrap;
  }
  .gd-drop button:hover, .gd-drop a:hover{ background:#f1f3f4; }
  .gd-drop .m-icon{ font-size:17px; color:var(--gd-icon); }
  .gd-drop hr{ border:none; border-top:1px solid #e8eaed; margin:6px 0; }
  .gd-actions{ display:flex; align-items:center; gap:10px; flex-shrink:0; padding-top:6px; }
  .gd-share{
    display:inline-flex; align-items:center; gap:7px; height:38px; padding:0 18px 0 14px;
    border:none; border-radius:999px; background:var(--gd-tonal); color:var(--gd-tonal-ink);
    font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer;
  }
  .gd-share:hover{ box-shadow:0 1px 2px rgba(60,64,67,.3); }
  .gd-share .m-icon{ font-size:17px; }
  .gd-avatar{
    width:32px; height:32px; border-radius:50%; background:hsl(var(--app-primary)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; user-select:none;
  }

  /* 工具列藥丸 */
  .gd-toolbar{
    display:flex; align-items:center; gap:2px; margin-top:6px;
    background:var(--gd-tb); border-radius:999px; padding:4px 10px; min-height:40px;
    overflow-x:auto; scrollbar-width:none;
  }
  .gd-toolbar::-webkit-scrollbar{ display:none; }
  .gd-tbtn{
    flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
    width:30px; height:30px; border:none; border-radius:6px; background:none; color:var(--gd-icon);
    cursor:pointer; font-family:inherit;
  }
  .gd-tbtn:hover{ background:var(--gd-hover); }
  .gd-tbtn .m-icon{ font-size:19px; }
  .gd-zoom{
    flex-shrink:0; height:28px; border:none; border-radius:6px; background:none; color:var(--gd-ink);
    font-family:inherit; font-size:13px; padding:0 4px; cursor:pointer;
  }
  .gd-zoom:hover{ background:var(--gd-hover); }
  .gd-seg{
    flex-shrink:0; display:inline-flex; border:1px solid #a8c7fa; border-radius:999px; overflow:hidden; background:#fff;
  }
  .gd-seg button{
    appearance:none; border:0; background:#fff; color:var(--gd-ink); cursor:pointer;
    font-family:inherit; font-size:12.5px; font-weight:600; padding:5px 14px; white-space:nowrap;
  }
  .gd-seg button + button{ border-left:1px solid #a8c7fa; }
  .gd-seg button.on{ background:var(--gd-tonal); color:var(--gd-tonal-ink); }
  .gd-right{ margin-left:auto; display:flex; align-items:center; gap:8px; flex-shrink:0; padding-left:8px; }

  /* ---- 內容捲動區：Docs「無頁面（pageless）」一頁式——整面白底、單欄連續捲動，
         無紙張邊框、無分頁、無尺規。 ---- */
  .scroll{ flex:1; min-height:0; overflow-y:auto; background:#fff; }
  .pages{ padding:0 0 120px; }
  .gd-pageless{
    max-width:900px; margin:0 auto; background:#fff;
    padding:44px 64px 40px;
  }
  /* 原文（raw）視圖同一條 pageless 欄 */
  .gd-rawsheet{
    max-width:900px; margin:0 auto; background:#fff; padding:44px 64px 40px;
  }
  .gd-rawsheet pre{
    margin:0; font-family:var(--mono); font-size:12.5px; line-height:1.75;
    white-space:pre-wrap; word-break:break-word; color:#1e293b;
  }

  /* toast（共用＝複製連結） */
  .gd-toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:400;
    background:#3c4043; color:#fff; font-size:13px; padding:9px 18px; border-radius:8px;
    box-shadow:0 4px 12px rgba(0,0,0,.3); opacity:0; transition:opacity .2s; pointer-events:none;
  }
  .gd-toast.show{ opacity:1; }

  /* 渲染視圖（marked 輸出）的排版——內容不變，字級配合 624px 紙面欄寬 */
  .md{ font-size:14px; line-height:1.9; color:#1e293b; }
  .md h1{ font-size:24px; line-height:1.4; margin:0 0 14px; letter-spacing:-.01em; color:#0b1220; }
  .md h2{ font-size:19px; margin:34px 0 10px; padding-top:16px; border-top:1px solid #e2e8f0; color:#0b1220; }
  .md h1 + p, .md h2:first-child{ border-top:none; padding-top:0; }
  .md h3{ font-size:16px; margin:24px 0 8px; color:#0b1220; }
  .md h4{ font-size:14px; margin:18px 0 6px; color:#0b1220; }
  .md p{ margin:0 0 11px; }
  .md strong{ color:#0b1220; }
  .md blockquote{
    margin:0 0 13px; padding:9px 14px; border-left:3px solid var(--gd-blue);
    background:#f8fafc; color:#475569; border-radius:0 8px 8px 0; font-size:13px;
  }
  .md blockquote p{ margin:0; }
  .md ul, .md ol{ margin:0 0 11px; padding-left:24px; }
  .md li{ margin:3px 0; }
  .md code{ font-family:var(--mono); font-size:.9em; background:hsl(0 0% 50% / .12); padding:1px 5px; border-radius:4px; }
  .md pre{ background:#0f172a; color:#e2e8f0; border-radius:10px; padding:13px 15px; overflow-x:auto; font-size:12px; }
  .md pre code{ background:none; padding:0; }
  .md table{ width:100%; border-collapse:collapse; font-size:12.5px; margin:13px 0 16px; display:block; overflow-x:auto; }
  .md th{
    text-align:left; font-weight:600; color:#475569; border-bottom:1.5px solid #cbd5e1;
    padding:6px 9px; white-space:nowrap;
  }
  .md td{ padding:6px 9px; border-bottom:1px solid #e2e8f0; vertical-align:top; }
  .md hr{ border:none; border-top:1px solid #e2e8f0; margin:28px 0; }
  .md img{ max-width:100%; height:auto; display:block; margin:16px auto 6px; border:1px solid #e2e8f0; border-radius:6px; background:#fff; }
  .md a{ color:var(--gd-blue); text-decoration:none; }
  .md a:hover{ text-decoration:underline; }

  .loading{ text-align:center; color:#5f6368; padding:80px 0; font-size:14px; }

  @media (max-width:860px){
    .gd-actions .gd-avatar{ display:none; }
    .gd-pageless, .gd-rawsheet{ padding:28px 20px 32px; }
  }
  @media print{
    .app-toolbar, .gd-chrome, .gd-toast{ display:none !important; }
    .scroll{ overflow:visible; }
    .pages{ padding:0; zoom:1 !important; }
  }
</style>
<script>
  /* header 主題與首頁一致（讀 app 的 localStorage，同 slides/index.html）。 */
  (function () {
    var dark = true, accent = 'blue';
    try {
      var s = JSON.parse(localStorage.getItem('adapt-metro:session:v1') || '{}');
      if (typeof s.dark === 'boolean') dark = s.dark;
      if (typeof s.accent === 'string') accent = s.accent;
    } catch (e) { /* 用預設 */ }
    var root = document.documentElement;
    if (dark) root.classList.add('dark');
    if (accent && accent !== 'blue') root.dataset.theme = accent;
  })();
</script>
</head>
<body>
<header class="app-toolbar">
  <a class="brand" href="../../../" title="重新載入">
    <span class="material-symbols-outlined m-icon" style="font-size:16px">map</span>
    <span class="brand-name">Adapt-Metro</span>
  </a>
  <a class="btn-ghost skills-link" href="../../../">Skills</a>
  <a class="btn-ghost" href="../">論文內容</a>
  <a class="btn-ghost" id="hdrPaper" href="./">論文本文</a>
  <a class="btn-ghost" id="hdrImprove" href="./?doc=improve">改善建議</a>
  <a class="btn-ghost" href="../../">系統介紹</a>
  <a class="btn-ghost" href="../../architecture/">系統架構</a>
</header>

<!-- ===== Google Docs 式門面（樣式仿 Docs；功能都是本頁原有的：文件切換／顯示⇄原文／下載／列印／縮放） ===== -->
<div class="gd-chrome">
  <div class="gd-titlebar">
    <!-- Docs 藍色文件圖示 -->
    <svg class="gd-docicon" viewBox="0 0 26 34" aria-hidden="true">
      <path d="M16 0H3C1.35 0 0 1.35 0 3v28c0 1.65 1.35 3 3 3h20c1.65 0 3-1.35 3-3V10L16 0z" fill="#4285f4"/>
      <path d="M16 0v10h10L16 0z" fill="#a1c2fa"/>
      <rect x="6" y="15" width="14" height="1.8" rx=".9" fill="#f1f1f1"/>
      <rect x="6" y="19" width="14" height="1.8" rx=".9" fill="#f1f1f1"/>
      <rect x="6" y="23" width="14" height="1.8" rx=".9" fill="#f1f1f1"/>
      <rect x="6" y="27" width="9" height="1.8" rx=".9" fill="#f1f1f1"/>
    </svg>
    <div class="gd-titlecol">
      <div class="gd-titlerow">
        <span class="gd-title" id="gdTitle">論文本文</span>
      </div>
      <nav class="gd-menus" aria-label="選單列">
        <span class="gd-menu" id="menuFile">檔案
          <div class="gd-drop" id="dropFile" hidden>
            <a id="dlLink" href="../paper.md" download="論文本文.md"><span class="material-symbols-outlined m-icon">download</span>下載 .md</a>
            <button id="printBtn" type="button"><span class="material-symbols-outlined m-icon">print</span>列印</button>
            <hr />
            <button id="copyLinkFile" type="button"><span class="material-symbols-outlined m-icon">link</span>複製連結</button>
          </div>
        </span>
        <span class="gd-menu" id="menuView">查看
          <div class="gd-drop" id="dropView" hidden>
            <button id="mView" type="button"><span class="material-symbols-outlined m-icon">visibility</span>顯示（Markdown 渲染）</button>
            <button id="mRaw" type="button"><span class="material-symbols-outlined m-icon">code</span>原文（.md）</button>
            <hr />
            <button id="mDocPaper" type="button"><span class="material-symbols-outlined m-icon">description</span>論文本文</button>
            <button id="mDocImprove" type="button"><span class="material-symbols-outlined m-icon">rate_review</span>改善建議</button>
          </div>
        </span>
      </nav>
    </div>
    <div class="gd-actions">
      <button class="gd-share" id="shareBtn" type="button" title="複製本頁連結">
        <span class="material-symbols-outlined m-icon">lock</span>共用
      </button>
      <div class="gd-avatar" title="kevin7261">K</div>
    </div>
  </div>

  <div class="gd-toolbar">
    <button class="gd-tbtn" id="tbPrint" title="列印"><span class="material-symbols-outlined m-icon">print</span></button>
    <select class="gd-zoom" id="zoomSel" title="縮放">
      <option value="0.75">75%</option>
      <option value="0.9">90%</option>
      <option value="1" selected>100%</option>
      <option value="1.25">125%</option>
      <option value="1.5">150%</option>
    </select>
    <div class="gd-right">
      <div class="gd-seg" role="tablist" aria-label="文件">
        <button id="docPaper" class="on" type="button">論文本文</button>
        <button id="docImprove" type="button">改善建議</button>
      </div>
      <div class="gd-seg" role="tablist" aria-label="檢視模式">
        <button id="btnView" class="on" type="button">顯示</button>
        <button id="btnRaw" type="button">原文</button>
      </div>
    </div>
  </div>

</div>

<div class="scroll" id="scroll">
  <div class="pages" id="pages">
    <div class="gd-pageless"><div id="view" class="md"><div class="loading">載入論文本文中…</div></div></div>
  </div>
  <div class="pages" id="rawWrap" hidden>
    <div class="gd-rawsheet"><pre id="rawPre"></pre></div>
  </div>
</div>

<div class="gd-toast" id="gdToast">已複製連結</div>

<script src="./marked.umd.js"></script>
<script>
(function(){
  var btnView = document.getElementById('btnView');
  var btnRaw = document.getElementById('btnRaw');
  var docPaper = document.getElementById('docPaper');
  var docImprove = document.getElementById('docImprove');
  var pages = document.getElementById('pages');
  var view = document.getElementById('view');
  var rawWrap = document.getElementById('rawWrap');
  var rawPre = document.getElementById('rawPre');
  var scroll = document.getElementById('scroll');
  var dlLink = document.getElementById('dlLink');
  var gdTitle = document.getElementById('gdTitle');
  var zoomSel = document.getElementById('zoomSel');
  var toast = document.getElementById('gdToast');

  /* 兩份文件共用同一個「顯示⇄原文」檢視：?doc=improve 切到改善建議，#raw 進原文模式。 */
  var DOCS = {
    paper:   { file: '../paper.md',   label: '論文本文', dl: '論文本文.md' },
    improve: { file: '../improve.md', label: '改善建議', dl: '改善建議.md' },
  };
  var docKey = 'paper';
  var mode = 'view';

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){ toast.classList.remove('show'); }, 1800);
  }

  /* 縮放：CSS zoom（pageless 一頁式，欄寬自適應，不需要「符合寬度」） */
  function applyZoom(){
    var z = parseFloat(zoomSel.value) || 1;
    pages.style.zoom = z;
    rawWrap.style.zoom = z;
  }
  zoomSel.addEventListener('change', applyZoom);

  function syncUrl(){
    var q = docKey === 'paper' ? '' : '?doc=' + docKey;
    history.replaceState(null, '', location.pathname + q + (mode === 'raw' ? '#raw' : '#view'));
  }
  function setMode(m){
    mode = m;
    var isRaw = m === 'raw';
    pages.hidden = isRaw;
    rawWrap.hidden = !isRaw;
    btnView.classList.toggle('on', !isRaw);
    btnRaw.classList.toggle('on', isRaw);
    scroll.scrollTop = 0;
    document.title = (isRaw ? '原文' : '顯示') + ' · ' + DOCS[docKey].label + ' · Adapt-Metro';
    syncUrl();
  }
  function loadDoc(key){
    docKey = key;
    var doc = DOCS[key];
    docPaper.classList.toggle('on', key === 'paper');
    docImprove.classList.toggle('on', key === 'improve');
    /* header 的「論文本文／改善建議」active 跟目前文件連動 */
    var hdrPaper = document.getElementById('hdrPaper');
    var hdrImprove = document.getElementById('hdrImprove');
    if (hdrPaper) hdrPaper.classList.toggle('active', key === 'paper');
    if (hdrImprove) hdrImprove.classList.toggle('active', key === 'improve');
    gdTitle.textContent = doc.label;
    dlLink.href = doc.file;
    dlLink.setAttribute('download', doc.dl);
    view.innerHTML = '<div class="loading">載入' + doc.label + '中…</div>';
    rawPre.textContent = '';
    fetch(doc.file)
      .then(function(res){
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function(md){
        rawPre.textContent = md;
        view.innerHTML = marked.parse(md, { mangle: false, headerIds: false });
        /* md 內的相對圖檔（figs/…）以 paper.md 所在目錄為準——本頁在下一層，補 ../ 前綴。 */
        view.querySelectorAll('img').forEach(function(img){
          var src = img.getAttribute('src') || '';
          if (src && !/^(https?:|data:|\/|\.\.\/)/.test(src)) img.setAttribute('src', '../' + src);
        });
        setMode(mode);
      })
      .catch(function(err){
        view.innerHTML = '<div class="loading">載入失敗：' + String(err.message || err) + '</div>';
      });
  }

  btnView.addEventListener('click', function(){ setMode('view'); });
  btnRaw.addEventListener('click', function(){ setMode('raw'); });
  docPaper.addEventListener('click', function(){ if (docKey !== 'paper') { loadDoc('paper'); syncUrl(); } });
  docImprove.addEventListener('click', function(){ if (docKey !== 'improve') { loadDoc('improve'); syncUrl(); } });

  /* ---- Docs 門面互動：檔案／查看下拉、共用＝複製連結、列印 ---- */
  function wireMenu(menuEl, dropEl){
    menuEl.addEventListener('click', function(e){
      if (e.target.closest('.gd-drop')) return;
      var open = dropEl.hasAttribute('hidden');
      document.querySelectorAll('.gd-drop').forEach(function(d){ d.setAttribute('hidden',''); });
      document.querySelectorAll('.gd-menu.open').forEach(function(m){ m.classList.remove('open'); });
      if (open){ dropEl.removeAttribute('hidden'); menuEl.classList.add('open'); }
      e.stopPropagation();
    });
  }
  wireMenu(document.getElementById('menuFile'), document.getElementById('dropFile'));
  wireMenu(document.getElementById('menuView'), document.getElementById('dropView'));
  document.addEventListener('mousedown', function(e){
    if (!e.target.closest('.gd-menu')){
      document.querySelectorAll('.gd-drop').forEach(function(d){ d.setAttribute('hidden',''); });
      document.querySelectorAll('.gd-menu.open').forEach(function(m){ m.classList.remove('open'); });
    }
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape'){
      document.querySelectorAll('.gd-drop').forEach(function(d){ d.setAttribute('hidden',''); });
      document.querySelectorAll('.gd-menu.open').forEach(function(m){ m.classList.remove('open'); });
    }
  });
  function copyLink(){
    (navigator.clipboard ? navigator.clipboard.writeText(location.href) : Promise.reject())
      .then(function(){ showToast('已複製連結'); })
      .catch(function(){ showToast(location.href); });
  }
  document.getElementById('shareBtn').addEventListener('click', copyLink);
  document.getElementById('copyLinkFile').addEventListener('click', copyLink);
  document.getElementById('printBtn').addEventListener('click', function(){ window.print(); });
  document.getElementById('tbPrint').addEventListener('click', function(){ window.print(); });
  document.getElementById('mView').addEventListener('click', function(){ setMode('view'); });
  document.getElementById('mRaw').addEventListener('click', function(){ setMode('raw'); });
  document.getElementById('mDocPaper').addEventListener('click', function(){ if (docKey !== 'paper'){ loadDoc('paper'); syncUrl(); } });
  document.getElementById('mDocImprove').addEventListener('click', function(){ if (docKey !== 'improve'){ loadDoc('improve'); syncUrl(); } });

  if (location.hash === '#raw') mode = 'raw';
  var q = new URLSearchParams(location.search);
  loadDoc(q.get('doc') === 'improve' ? 'improve' : 'paper');
})();
</script>
</body>
</html>
